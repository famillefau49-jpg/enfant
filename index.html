<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réseau du Lynx - Résistants</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c0c0c;
      color: #f1e6cf;
      font-family: "Courier New", monospace;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: #1b1b1b;
      border: 2px solid #7b5d31;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    h1 {
      color: #75b6ff;
      letter-spacing: 3px;
    }

    .mission {
      margin-top: 20px;
      background: #241f19;
      padding: 20px;
      border-radius: 12px;
      line-height: 1.7;
    }

    .coords {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    .map-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 20px;
      background: linear-gradient(180deg, #6fb4ff, #3c7dc4);
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      font-size: 16px;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>RÉSISTANTS</h1>

    <div class="mission">
      Le Lynx vous a identifiés.<br><br>

      Vous devez vous rendre immédiatement au point indiqué.<br>
      Approchez discrètement.<br>
      Asseyez-vous sur place et attendez la suite.
    </div>

    <div class="coords">
      N 47° 34.675'<br>
      E 003° 38.364'
    </div>

    <a href="https://www.google.com/maps?q=47.577435744266715,3.6402020097870356" target="_blank" class="map-btn">
      Ouvrir la position
    </a>

    <div class="footer">
      VIVRE LIBRE OU MOURIR
    </div>
  </div>

</body>
</html>
